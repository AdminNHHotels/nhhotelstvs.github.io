<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NH Hotels TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Inter:wght@400;600;700&family=Montserrat:wght@500;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!--
    Firebase SDK is loaded as ESM via CDN. No bundler required.
    All app modules use ES module import/export syntax.
    config.js globals (FIREBASE_CONFIG, constants) are loaded first as a classic
    script so they are available to all modules without explicit import.
  -->
  <script src="config.js"></script>
</head>
<body>
  <nav id="category-buttons" aria-label="Category navigation">
    <!-- Buttons rendered at runtime by app.js -->
  </nav>

  <main id="main-content" aria-live="polite">
    <!-- Swapped by state.js: events table | carousel slide | gallery viewer -->
  </main>

  <div id="overlay-connecting" hidden aria-live="assertive">Connecting…</div>
  <div id="overlay-error"      hidden aria-live="assertive"></div>

  <!-- Bootstrap app as ES module (imports firebase.js, state.js, etc.) -->
  <script type="module" src="app.js"></script>
</body>
</html>
